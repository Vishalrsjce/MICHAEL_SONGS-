<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Music Player</title>
    <link rel="stylesheet" href="style_S.css">
    <!-- Font Awesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
</head>
<body>
    <div class="player-container">
        <!-- NEW: RGB Spotlights -->
        <div class="spotlight" id="spotlight-left"></div>
        <div class="spotlight" id="spotlight-right"></div>

        <!-- CD and Song Info -->
        <div class="cd-wrapper">
            <div class="cd">
                <img src="Songs/Songs.png" alt="Album Art" id="album-art">
            </div>
        </div>
        <div class="song-details">
            <h2 id="title">Select a Song</h2>
            <h3 id="artist">From the Playlist</h3>
        </div>

        <!-- Audio Source -->
        <audio id="audio-source"></audio>

        <!-- Main Controls -->
        <div class="controls-wrapper">
            <button id="prev-btn" class="control-btn"><i class="fas fa-backward"></i></button>
            <button id="play-btn" class="control-btn play-pause"><i class="fas fa-play"></i></button>
            <button id="next-btn" class="control-btn"><i class="fas fa-forward"></i></button>
        </div>

        <!-- Volume Control -->
        <div class="volume-wrapper">
            <i id="volume-icon" class="fas fa-volume-up"></i>
            <input type="range" id="volume-slider" class="volume-slider" min="0" max="100" value="75">
        </div>

        <!-- Playlist and Genres -->
        <div class="playlist-wrapper">
            <div class="genre-header">
                <h3>Genres</h3>
                <select id="genre-select"></select>
            </div>
            <input type="text" id="search-bar" placeholder="Search in this genre...">
            <ul id="song-playlist"></ul>
        </div>
    </div>

    <script src="script_S.js"></script>
</body>
</html>
